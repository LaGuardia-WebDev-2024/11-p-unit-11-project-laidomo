<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <button id="mem1-button">Movie #1</button>
    <button id="mem2-button">Movie #2</button>
    <button id="mem3-button">Movie #3</button>
    <h1>My Top 3 FAVORITE <span>movies</span></h1>
    <ol>
      <li>
        <h3 id="mem1">The Nightmare Before Christmas</h3>
        <p>More about this movie</p>
        <img class="Movie1" src="https://static01.nyt.com/images/2023/10/25/multimedia/25nightmare-anniv-01-tfvj/25nightmare-anniv-01-tfvj-articleLarge.jpg?quality=75&auto=webp&disable=upscale"
        width="400">

      </li>

      <li>
        <h3 id="mem2">Crazy Rich Asians</h3>
        <p>More about this movie</p>
        <img class="Movie2" src="https://media.wired.com/photos/5b772363bf43583fad135dba/master/pass/CRA-08100.jpg"
        width="400">
      </li>

      <li>
        <h3 id="mem3">The Parent Trap </h3>
        <p>More about this movie</p>
        <img class="Movie3" src="https://d23.com/app/uploads/2017/02/1180w-600h_a-to-z-the-parent-trap-1998.jpg"
        width="400">
      </li>
    </ol>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>

      $(".Movie1").hide();
     
      // ======================== Button #1
      $("#mem1-button").click(function () {
        $("#mem1").css("color", "blue");
        $(".Movie1").show(2000)
      });

      $(".Movie2").hide();

      // ======================== Button #2
      $("#mem2-button").click(function () {
        $("#mem2").css("color", "red");
        $(".Movie2").show(2000)
      });

      $(".Movie3").hide();
      // ======================== Button #3
      $("#mem3-button").click(function () {
        $("#mem3").css("color", "green");
         $(".Movie3").show(2000)
      });


    </script>
  </body>
</html>
